# ci.yml
# Runs the iOS test suite on GitHub Actions using a macOS runner.
# Connects to: HabitTracker.xcodeproj, README.md, CHANGELOG.md
# Created: 2026-07-02

name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run XCTest Suite
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select available simulator
        shell: bash
        run: |
          set -euo pipefail

          simulator_id="$(
            xcrun simctl list devices available |
            grep -E "iPhone (16|15|14)" |
            head -n 1 |
            sed -E 's/.*\(([-A-F0-9]+)\) \(.*/\1/'
          )"

          if [ -z "$simulator_id" ]; then
            echo "No available iPhone simulator was found on the runner." >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "SIMULATOR_ID=$simulator_id" >> "$GITHUB_ENV"
          echo "Using simulator ID: $simulator_id"

      - name: Run unit tests
        run: >
          xcodebuild
          test
          -project HabitTracker.xcodeproj
          -scheme HabitTracker
          -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
          -destination-timeout 180
          CODE_SIGNING_ALLOWED=NO
